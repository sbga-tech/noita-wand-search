name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - run: npm ci --prefix crates/noita_web
      - run: cargo install trunk --locked
      - id: pages
        uses: actions/configure-pages@v5
      - name: Build dist
        run: |
          PUBLIC_URL="${{ steps.pages.outputs.base_path }}/"
          PATH="$PWD/node_modules/.bin:$PATH" trunk build --release=true --public-url "$PUBLIC_URL"
        working-directory: crates/noita_web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: crates/noita_web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
