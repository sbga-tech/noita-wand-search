trunk-version = ">=0.21.0"

[build]
target = "index.html"
dist = "dist"
public_url = "/"
filehash = true

[[hooks]]
stage = "pre_build"
command = "node"
command_arguments = ["tools/sync-assets.mjs"]


[serve]
headers = { "Cross-Origin-Opener-Policy" = "same-origin", "Cross-Origin-Embedder-Policy" = "require-corp" }
